name: Build

# Runs on every pull request, so all code is built, tested, and linted before merge.
on:
  pull_request:

# Cancel an in-progress run when the same ref is pushed again, to avoid piling
# up redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # `verify` compiles, runs the JUnit suite (Testcontainers Postgres), and
      # runs Checkstyle + Javadoc doclint in one pass.
      - name: Build, test and lint
        run: ./mvnw -B verify

  till-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: till-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: till-client/package-lock.json
      - name: Install dependencies
        run: npm ci
      # gts enforces the Google TypeScript Style Guide (lint + Prettier format).
      - name: Lint (gts / Google TS style)
        run: npm run lint
      - name: Build
        run: npm run build
