spring.application.name=inventory-manager

# Local development datasource (PostgreSQL via docker-compose at the repo root).
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory
spring.datasource.username=inventory
spring.datasource.password=inventory

# Flyway owns the schema; Hibernate only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
